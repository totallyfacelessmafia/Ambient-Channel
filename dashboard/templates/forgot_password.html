<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — AmbiHub</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='home.css') }}">
</head>
<body class="home-body">
  <nav class="home-nav">
    <a class="home-nav-brand" href="/">&#9889; AmbiHub</a>
    <div class="home-nav-right">
      <a href="{{ url_for('login_page') }}" class="btn btn-ghost btn-sm">Sign In</a>
    </div>
  </nav>

  <div class="auth-page">
    <div class="auth-card">
      <h1 class="auth-title">Reset your password</h1>
      <p class="auth-subtitle">Enter the email on your account and we'll send you a reset link.</p>

      {% if error %}
      <div class="auth-error">{{ error }}</div>
      {% endif %}

      {% if success %}
      <div class="auth-success">
        <p>{{ success }}</p>
        {% if reset_link %}
        <div class="reset-link-box">
          <label>Reset link (share with the account holder):</label>
          <input type="text" value="{{ reset_link }}" readonly onclick="this.select();" class="reset-link-input">
        </div>
        {% endif %}
      </div>
      {% else %}
      <form method="POST" action="{{ url_for('forgot_password_page') }}" class="auth-form">
        <div class="auth-field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required autofocus
                 autocomplete="email" placeholder="you@example.com">
        </div>
        <button type="submit" class="btn btn-primary auth-btn">Send Reset Link</button>
      </form>
      {% endif %}

      <p class="auth-alt"><a href="{{ url_for('login_page') }}">Back to sign in</a></p>
    </div>
  </div>
</body>
</html>
