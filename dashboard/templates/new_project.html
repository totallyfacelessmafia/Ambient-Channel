{% extends "base.html" %}
{% block title %}New Project — UltraFocusZone{% endblock %}

{% block content %}
<div class="form-page">
  <h1>New Project</h1>

  <form method="POST" action="{{ url_for('create_project') }}" class="project-form">

    <div class="form-group">
      <label for="title">Video title</label>
      <input type="text" id="title" name="title" required
             placeholder="e.g. Deep Focus" maxlength="40"
             autocomplete="off">
      <small>1–2 words, Title Case. Shown on the thumbnail.</small>
    </div>

    <div class="form-group">
      <label for="prompt">Scene description</label>
      <div class="yt-fetch-row">
        <button type="button" class="btn btn-ghost btn-sm" id="fetch-yt-btn">
          ✦ Auto-fill from YouTube channel
        </button>
        <span class="yt-fetch-status" id="yt-status"></span>
      </div>
      <div class="yt-thumb-strip" id="yt-thumbs" style="display:none"></div>
      <textarea id="prompt" name="prompt" required rows="4"
                placeholder="e.g. cozy rainy cabin with a fireplace and bookshelves"></textarea>
      <small>Cinematic style keywords are added automatically.</small>
    </div>

    <div class="form-actions">
      <a class="btn btn-ghost" href="{{ url_for('index') }}">Cancel</a>
      <button type="submit" class="btn btn-primary">Create Project →</button>
    </div>

  </form>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('fetch-yt-btn').addEventListener('click', function () {
  const status = document.getElementById('yt-status');
  const strip  = document.getElementById('yt-thumbs');
  this.disabled = true;
  status.textContent = 'Fetching channel thumbnails…';

  fetch('/api/youtube-style')
    .then(r => r.json())
    .then(d => {
      this.disabled = false;
      if (d.ok) {
        document.getElementById('prompt').value = d.prompt;
        status.textContent = 'Style loaded from your channel ✓';
        if (d.thumbnails && d.thumbnails.length) {
          strip.innerHTML = d.thumbnails
            .filter(t => t.thumbnail_url)
            .map(t => `<img class="yt-thumb" src="${t.thumbnail_url}" title="${t.title}">`)
            .join('');
          strip.style.display = 'flex';
        }
      } else {
        status.textContent = 'Error: ' + d.error;
      }
    })
    .catch(() => {
      this.disabled = false;
      status.textContent = 'Network error.';
    });
});
</script>
{% endblock %}
