<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set New Password — ChannelForge</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='home.css') }}">
</head>
<body class="home-body">
  <nav class="home-nav">
    <a class="home-nav-brand" href="/">&#9889; ChannelForge</a>
  </nav>

  <div class="auth-page">
    <div class="auth-card">
      <h1 class="auth-title">Set a new password</h1>
      {% if email %}
      <p class="auth-subtitle">Resetting password for <strong>{{ email }}</strong></p>
      {% endif %}

      {% if error %}
      <div class="auth-error">{{ error }}</div>
      {% endif %}

      {% if expired %}
      <div class="auth-error">This reset link has expired or is invalid.</div>
      <p class="auth-alt"><a href="{{ url_for('forgot_password_page') }}">Request a new reset link</a></p>
      {% else %}
      <form method="POST" action="{{ url_for('reset_password_page', token=token) }}" class="auth-form" id="reset-form">
        <div class="auth-field">
          <label for="password">New Password</label>
          <input type="password" id="password" name="password" required
                 autocomplete="new-password" placeholder="Minimum 6 characters" minlength="6">
        </div>
        <div class="auth-field">
          <label for="password2">Confirm New Password</label>
          <input type="password" id="password2" name="password2" required
                 autocomplete="new-password" placeholder="Re-enter your password" minlength="6">
        </div>
        <button type="submit" class="btn btn-primary auth-btn">Reset Password</button>
      </form>

      <script>
        document.getElementById('reset-form').addEventListener('submit', function(e) {
          var pw1 = document.getElementById('password').value;
          var pw2 = document.getElementById('password2').value;
          if (pw1 !== pw2) { e.preventDefault(); alert('Passwords do not match.'); }
        });
      </script>
      {% endif %}
    </div>
  </div>
</body>
</html>
